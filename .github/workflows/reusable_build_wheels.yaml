# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# Reusable workflow called by other workflows. (It never triggers on its own.)
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~

# The tilde is only to make our reusable workflows be listed last in the UI.
name: '~ Build & test Python wheels'
run-name: Build Python wheels and test that they work

on:
  workflow_call:
    inputs:
      upload:
        description: 'Upload wheels to GitHub'
        type: boolean
        default: false
      debug:
        description: 'Run with debugging options'
        type: boolean
        default: false

  workflow_dispatch:
    inputs:
      upload:
        description: 'Upload wheels to GitHub'
        type: boolean
        default: false
      debug:
        description: 'Run with debugging options'
        type: boolean
        default: true

permissions: read-all

jobs:
  build-wheels:
    name: Build on ${{matrix.conf.os}}/${{matrix.conf.arch}}
    runs-on: ${{matrix.conf.os}}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        conf: [
          # {os: ubuntu-24.04, arch: x86_64, pyarch: x64},
          # {os: macos-13,     arch: x86_64, pyarch: x64},
          # {os: macos-14,     arch: arm64,  pyarch: arm64},
          # {os: macos-15,     arch: arm64,  pyarch: arm64},
          {os: windows-2022, arch: AMD64,  pyarch: x64},
        ]
    steps:
      - name: Check out a copy of the git repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 1

      - name: Set up Python with caching of pip dependencies
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            dev-requirements.txt

      - name: Install Python requirements
        run: |
          python3 -m pip install -r requirements.txt
          python3 -m pip install -r dev-requirements.txt
          python3 -m pip install cibuildwheel==2.23.3

      - if: startsWith(matrix.conf.os, 'macos')
        name: Set CMake MACOSX_DEPLOYMENT_TARGET value on MacOS
        run: |
          set -x
          os=${{matrix.conf.os}}
          echo MACOSX_DEPLOYMENT_TARGET=${os: -2} >> "$GITHUB_ENV"

      - name: Determine the number of threads we can tell cibuildwheel to use
        shell: python
        run: |
          import os
          num_cpus = os.cpu_count()
          threads = 1
          if num_cpus is not None and num_cpus > 0:
            threads = max(1, num_cpus - 1)
          else:
            # On Windows, may need to fall back to using NUMBER_OF_PROCESSORS.
            num_procs_env = os.environ.get('NUMBER_OF_PROCESSORS')
            if num_procs_env and num_procs_env.isdigit():
                threads = max(1, int(num_procs_env) - 1)
          with open(os.environ['GITHUB_ENV'], 'a') as f:
            f.write(f"num_threads={threads}\n")

      - name: Build and test wheels
        env:
          # Note: additional cibuildwheel settings are in pyproject.toml.
          CIBW_BUILD: 'cp310* cp311* cp312* cp313*'
          CIBW_ARCHS: ${{matrix.conf.arch}}
          #CIBW_BUILD_VERBOSITY: ${{inputs.debug && 1 || ''}}
          CIBW_BUILD_VERBOSITY: 1
          # Color codes make the raw logs hard to read. (CMake uses CLICOLOR.)
          CLICOLOR: ${{inputs.debug && 0 || ''}}
          CMAKE_BUILD_PARALLEL_LEVEL: ${{env.num_threads}}
        run: |
          python3 -m cibuildwheel --output-dir wheelhouse

      - if: inputs.upload != false
        name: Upload wheels to GitHub
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: python-wheels-${{matrix.conf.os}}-${{matrix.conf.arch}}
          path: ./wheelhouse/*.whl
